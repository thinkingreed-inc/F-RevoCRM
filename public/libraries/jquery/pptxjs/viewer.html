<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PowerPoint Preview</title>
<link rel="stylesheet" href="css/pptxjs.css">
<link rel="stylesheet" href="css/nv.d3.min.css">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: auto; background: #f0f0f0; }
  #loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #A0AEC0; font-family: sans-serif; font-size: 14px; }
  #error { display: none; padding: 40px; text-align: center; color: #E53E3E; font-family: sans-serif; }
  #result { padding: 10px; }
  #result .slide { margin: 10px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.15); background: #fff; }
</style>
</head>
<body>
<div id="loading">読み込み中...</div>
<div id="error"></div>
<div id="result"></div>

<script src="../jquery.min.js"></script>
<script src="js/jszip.min.js"></script>
<script src="js/filereader.js"></script>
<script src="js/d3.min.js"></script>
<script src="js/nv.d3.min.js"></script>
<script src="js/dingbat.js"></script>
<script src="js/pptxjs.min.js"></script>
<script src="js/divs2slides.min.js"></script>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var fileUrl = params.get('file');
  if (!fileUrl) {
    showError('ファイルURLが指定されていません');
    return;
  }

  try {
    document.getElementById('loading').style.display = 'none';
    $("#result").pptxToHtml({
      pptxFileUrl: fileUrl,
      slideMode: false,
      mediaProcess: true
    });
  } catch(e) {
    showError('PowerPointの解析中にエラーが発生しました: ' + e.message);
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    var el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }
})();
</script>
</body>
</html>
