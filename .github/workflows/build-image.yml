name: Build CI PHP image

# E2E CI 用の php イメージを事前ビルドして GHCR に push する。
# これがあると E2E ワークフローは毎回のビルドを省略して pull だけで済む。
# docker/php 配下を変更した push、または手動実行で走る。
on:
  push:
    branches: [main]
    paths:
      - 'docker/php/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # イメージ名(小文字必須)と、docker/php/Dockerfile の内容ハッシュ tag を決める。
      # run-e2e.sh の pull 側と同じ tag 計算にすること。
      - name: Compute image ref
        id: ref
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          tag="$(git hash-object docker/php/Dockerfile | cut -c1-12)"
          echo "image=ghcr.io/${owner}/frevocrm-php" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/php/Dockerfile
          push: true
          tags: |
            ${{ steps.ref.outputs.image }}:${{ steps.ref.outputs.tag }}
            ${{ steps.ref.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
